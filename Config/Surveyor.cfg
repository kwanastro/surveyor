TRI32=math.sqrt(3.0)/2.0

-- Vessel parameters
LANDER_EMPTY_MASS=289.10
RETRO_EMPTY_MASS = 64.88
AMR_MASS = 3.82

RETRO_PROP_MASS=560.64
RETRO_STA   = -1.028

VERNIER_PROP_MASS = 70.98
VERNIER_ISP = 3200
VERNIER_THRUST = 463
VERNIER_RAD = 1.09
VERNIER_STA = -0.504

RCS_PROP_MASS=2
RCS_ISP = 630.0
RCS_THRUST = 0.25
RCS_RAD = 1.852
RCS_STA = -0.653
RCS_SPACE = 0.1

LEG_RAD       =  2.052
LEG_STA       = -0.792
LEG_PIVOT_RAD =  1.119
LEG_PIVOT_STA = -0.33

--For deploy/stow animations:
-- * Model shows deployed configuration
-- * deployed is animation progress 0.0
-- * stowed is animation progress 1.0
-- * deploying decreases animation progress
-- * stwoing increases animation progress
DEPLOYED=0
STOWED=1
DEPLOYING=2
STOWING=3

gear_status={progress=0.0, state=DEPLOYED, tag="GEAR",time=0.5,anim=nil}
ant_status={progress=0.0, state=DEPLOYED, tag="ANT",time=0.5,anim=nil}
scoop_status={progress=0.0, state=DEPLOYED, tag="SCOOP",time=15,anim=nil}
turn_ground_retrograde=false

--From Docs/Surveyor Retro Thrust.ods
local thrust_curve={
    {t= 0.00,F=    0},
    {t= 0.37,F=34487},
    {t= 1.87,F=35572},
    {t= 4.50,F=37232},
    {t= 7.50,F=38993},
    {t=10.00,F=39562},
    {t=13.03,F=39923},
    {t=15.71,F=41271},
    {t=18.24,F=42925},
    {t=20.00,F=43392},
    {t=23.59,F=43650},
    {t=26.78,F=43757},
    {t=30.00,F=43650},
    {t=33.53,F=43183},
    {t=35.31,F=42721},
    {t=35.88,F=42307},
    {t=36.16,F=41582},
    {t=36.81,F=35368},
    {t=37.52,F=26511},
    {t=38.36,F=17553},
    {t=38.83,F=12424},
    {t=39.39,F= 8696},
    {t=40.00,F= 6263},
    {t=41.51,F= 3363},
    {t=43.38,F= 1294},
    {t=45.26,F=  205},
    {t=46.48,F=    0},
    {t=49.95,F=    0},
}

local simt_retro_start=nil
local max_retro_thr=0
for i,row in pairs(thrust_curve) do
    if row.F>max_retro_thr then
        max_retro_thr=row.F
    end
end
local retro_itot=0
for i,row in pairs(thrust_curve) do
    if i>1 then
        local this_retro_imp=(thrust_curve[i-1].F+thrust_curve[i].F)/2*(thrust_curve[i].t-thrust_curve[i-1].t)
        retro_itot=retro_itot+this_retro_imp
    end
    row.L=row.F/max_retro_thr
end
local retro_isp   = retro_itot/RETRO_PROP_MASS
local simt_retro_t0=0
local simt_retro_L0=nil
local simt_retro_t1=nil
local simt_retro_L1=nil
local retro_current_seg=0

function anim_status_savestate(scn,status)
  oapi.writescenario_string(scn, status.tag,   status.state   .. " " .. status.progress)
end

function anim_status_propagate(status,simdt)
    local da = simdt / status.time
    if status.state == STOWING then
        if status.progress < 1.0 then
            status.progress=math.min(1.0, status.progress + da)
            vi:set_animation(status.anim,Sproing(status.progress))
       else
            status.state = STOWED
       end
    elseif status.state == DEPLOYING then
        if status.progress > 0.0 then
            status.progress = math.max(0.0, status.progress - da)
            vi:set_animation(status.anim, Sproing(status.progress))
        else
            status.state = DEPLOYED
        end
    end
end

-- helper function to create an iterator usable in a for loop
local function iterate_lines(scn)
    return function()
              return oapi.readscenario_nextline(scn)
           end
end

function clbk_loadstateex(scn, vs)
  for line in iterate_lines(scn) do
       local kw, state, progress = line:match("(%S+) (%d) (%S+)")
       if     kw == "GEAR"   then 
          gear_status.state=tonumber(state)
          gear_status.progress   = tonumber(progress)
          vi:set_animation(gear_status.anim,   Sproing(gear_status.progress))
       else
           vi:parse_scenario_line_ex(line, vs)
       end
  end
  
end

