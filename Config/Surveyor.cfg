function create_propellant()
  ph_vernier = vi:create_propellantresource(VERNIER_PROP_MASS);
  ph_rcs     = vi:create_propellantresource(RCS_PROP_MASS);
  ph_retro   = vi:create_propellantresource(RETRO_PROP_MASS);
  vi:set_default_propellantresource(ph_vernier);

end

function create_thrusters()
    th_retro = vi:create_thruster({pos=_V(0.0,0.0,RETRO_STA),dir=_V(0,0,1),maxth0=max_retro_thr, hprop=ph_retro, isp0=retro_isp});
  vi:add_exhaust(th_retro, 2, 0.3);
  vi:create_thrustergroup({th_retro}, THGROUP.HOVER);

  th_vernier={vi:create_thruster({pos=_V(   0.0*VERNIER_RAD, 1.0*VERNIER_RAD,VERNIER_STA), dir=_V(0,0,1), maxth0=VERNIER_THRUST, hprop=ph_vernier, isp0=VERNIER_ISP}),
              vi:create_thruster({pos=_V( TRI32*VERNIER_RAD,-0.5*VERNIER_RAD,VERNIER_STA), dir=_V(0,0,1), maxth0=VERNIER_THRUST, hprop=ph_vernier, isp0=VERNIER_ISP}),
              vi:create_thruster({pos=_V(-TRI32*VERNIER_RAD,-0.5*VERNIER_RAD,VERNIER_STA), dir=_V(0,0,1), maxth0=VERNIER_THRUST, hprop=ph_vernier, isp0=VERNIER_ISP})
              }
  
  vi:create_thrustergroup(th_vernier, THGROUP.MAIN);
  for i,thr in ipairs(th_vernier) do
      vi:add_exhaust(thr, 1, 0.1)
  end
  
  th_rcs = {
    --Roll (Leg1) jets
    vi:create_thruster({pos=_V(-RCS_SPACE,RCS_RAD,RCS_STA), dir=_V( 1,0,0), maxth0=RCS_THRUST, hprop=ph_rcs, isp0=RCS_ISP}),
    vi:create_thruster({pos=_V( RCS_SPACE,RCS_RAD,RCS_STA), dir=_V(-1,0,0), maxth0=RCS_THRUST, hprop=ph_rcs, isp0=RCS_ISP}),
    --Leg2 jets
    vi:create_thruster({pos=_V( TRI32*RCS_RAD,-0.5*RCS_RAD,RCS_STA-RCS_SPACE), dir=_V(0, 0, 1), maxth0=RCS_THRUST, hprop=ph_rcs, isp0=RCS_ISP}),
    vi:create_thruster({pos=_V( TRI32*RCS_RAD,-0.5*RCS_RAD,RCS_STA+RCS_SPACE), dir=_V(0, 0,-1), maxth0=RCS_THRUST, hprop=ph_rcs, isp0=RCS_ISP}),
    --Leg3 jets
    vi:create_thruster({pos=_V(-TRI32*RCS_RAD,-0.5*RCS_RAD,RCS_STA-RCS_SPACE), dir=_V(0, 0, 1), maxth0=RCS_THRUST, hprop=ph_rcs, isp0=RCS_ISP}),
    vi:create_thruster({pos=_V(-TRI32*RCS_RAD,-0.5*RCS_RAD,RCS_STA+RCS_SPACE), dir=_V(0, 0,-1), maxth0=RCS_THRUST, hprop=ph_rcs, isp0=RCS_ISP})
  }

  vi:create_thrustergroup({vi:create_thruster ({pos=_V( 0,1,0), dir=_V( 0,0, 1), maxth0=1e-9, hprop=ph_rcs, isp0=RCS_ISP})}, THGROUP.ATT_PITCHDOWN);
  vi:create_thrustergroup({vi:create_thruster ({pos=_V( 0,1,0), dir=_V( 0,0,-1), maxth0=1e-9, hprop=ph_rcs, isp0=RCS_ISP})}, THGROUP.ATT_PITCHUP);
  vi:create_thrustergroup({vi:create_thruster ({pos=_V( 0,1,0), dir=_V( 1,0, 0), maxth0=1e-9, hprop=ph_rcs, isp0=RCS_ISP})}, THGROUP.ATT_BANKRIGHT);
  vi:create_thrustergroup({vi:create_thruster ({pos=_V( 0,1,0), dir=_V(-1,0, 0), maxth0=1e-9, hprop=ph_rcs, isp0=RCS_ISP})}, THGROUP.ATT_BANKLEFT);
  vi:create_thrustergroup({vi:create_thruster ({pos=_V( 1,0,0), dir=_V( 0,0, 1), maxth0=1e-9, hprop=ph_rcs, isp0=RCS_ISP})}, THGROUP.ATT_YAWRIGHT);
  vi:create_thrustergroup({vi:create_thruster ({pos=_V(-1,0,0), dir=_V( 0,0,-1), maxth0=1e-9, hprop=ph_rcs, isp0=RCS_ISP})}, THGROUP.ATT_YAWLEFT);

  for i,thr in ipairs(th_rcs) do
    vi:add_exhaust(thr,0.1,0.05)
  end

end

function calc_emptymass()
  empty_mass=LANDER_EMPTY_MASS
  if vi:get_propellantmass(ph_retro)>0.999*RETRO_PROP_MASS then
      empty_mass=empty_mass+AMR_MASS
  end
  if vi:get_propellantmass(ph_retro)>0.001*RETRO_PROP_MASS then
      empty_mass=empty_mass+RETRO_EMPTY_MASS
  end
  return empty_mass
end

function clbk_setclasscaps(cfg)

  -- physical vessel parameters
  vi:set_size(1.0)
  
  vi:set_pmi(_V(0.5,0.6,0.5))
  vi:set_cameraoffset (_V(0,1,1))
  vi:set_camerarotationrange(PI,PI,PI/2.0,PI/2.0)

  vi:set_touchdownpoints( _V( 0,LEG_RAD,LEG_STA), _V(-TRI32*LEG_RAD,-0.5*LEG_RAD,LEG_STA), _V(TRI32*LEG_RAD,-0.5*LEG_RAD,LEG_STA));
  
  create_animations()
  create_propellant()
  create_thrusters()
  
  -- associate a mesh for the visual
  vi:add_mesh('Surveyor-Lander')
end

function clbk_savestate(scn)
  anim_status_savestate(scn,gear_status)
  anim_status_savestate(scn,ant_status)
  anim_status_savestate(scn,scoop_status)
end

local function toggle_status(status)
    if status.state == DEPLOYED or status.state == DEPLOYING then
        status.state=STOWING
    else
        status.state=DEPLOYING
    end
end

function clbk_consumebufferedkey(key, down, kstate)
    if not down then -- only process keydown events
        return false
    end

    if key == OAPI_KEY.G then     -- deploy/retract gear
        gear_status.state=DEPLOYING
        return true
    end
    if key == OAPI_KEY.A then     -- deploy/retract gear
        ant_status.state=DEPLOYING
        return true
    end
    if key == OAPI_KEY.S then     -- deploy/retract gear
        toggle_status(scoop_status)
        return true
    end
    if key == OAPI_KEY.E then     -- deploy/retract gear
        turn_ground_retrograde=not turn_ground_retrograde
        return true
    end
    return false
end

function Sproing(progress)
    return 1-(math.cos(PI*progress)/2.0+0.5)
end

--------------------------------------------------------------
-- Frame update
--------------------------------------------------------------
function steer(simt)
    local PP,MP,PY,MY
    PP=vi:get_thrustergrouplevel(THGROUP.ATT_PITCHUP)
    MP=vi:get_thrustergrouplevel(THGROUP.ATT_PITCHDOWN)
    PY=vi:get_thrustergrouplevel(THGROUP.ATT_YAWRIGHT)
    MY=vi:get_thrustergrouplevel(THGROUP.ATT_YAWLEFT)
    local PR=vi:get_thrustergrouplevel(THGROUP.ATT_BANKRIGHT)
    local MR=vi:get_thrustergrouplevel(THGROUP.ATT_BANKLEFT)
    local P=PP-MP;
    local Y=PY-MY;
    local R=PR-MR;

    --Set the vernier engine direction and differential thrust.
    vi:set_thrusterdir(th_vernier[0+1],_V(0.087*R,0,1));
    vi:set_thrusterdir(th_vernier[1+1],_V(0,0,1.0+0.05*P-0.05*Y));
    vi:set_thrusterdir(th_vernier[2+1],_V(0,0,1.0+0.05*P+0.05*Y));
    if vi:get_thrusterlevel(th_vernier[0+1])<0.01 then
      vi:set_thrusterlevel(th_rcs[0+1],math.max(0,math.min(1,PR)));
      vi:set_thrusterlevel(th_rcs[1+1],math.max(0,math.min(1,MR)));
      vi:set_thrusterlevel(th_rcs[2+1],math.max(0,math.min(1,PP+MY)));
      vi:set_thrusterlevel(th_rcs[3+1],math.max(0,math.min(1,MP+PY)));
      vi:set_thrusterlevel(th_rcs[4+1],math.max(0,math.min(1,PP+PY)));
      vi:set_thrusterlevel(th_rcs[5+1],math.max(0,math.min(1,MP+MY)));
    else
      vi:set_thrusterlevel(th_rcs[0+1],0);
      vi:set_thrusterlevel(th_rcs[1+1],0);
      vi:set_thrusterlevel(th_rcs[2+1],0);
      vi:set_thrusterlevel(th_rcs[3+1],0);
      vi:set_thrusterlevel(th_rcs[4+1],0);
      vi:set_thrusterlevel(th_rcs[5+1],0);
    end
    --Solid rocket motor
    if simt_retro_start==nil then
        --check for ignition
        if vi:get_thrustergrouplevel(THGROUP.HOVER)>0 then
            simt_retro_start=simt
            retro_current_seg=2
            simt_retro_t0=simt_retro_start+thrust_curve[retro_current_seg-1].t
            simt_retro_L0=thrust_curve[retro_current_seg-1].L
            simt_retro_t1=simt_retro_start+thrust_curve[retro_current_seg].t
            simt_retro_L1=thrust_curve[retro_current_seg].L
        end
    else
        while simt>simt_retro_t1 and retro_current_seg<#thrust_curve do
            retro_current_seg=retro_current_seg+1
            simt_retro_t0=simt_retro_start+thrust_curve[retro_current_seg-1].t
            simt_retro_L0=thrust_curve[retro_current_seg-1].L
            simt_retro_t1=simt_retro_start+thrust_curve[retro_current_seg].t
            simt_retro_L1=thrust_curve[retro_current_seg].L
        end
        if retro_current_seg==#thrust_curve then
            vi:set_thrustergrouplevel(THGROUP.HOVER,0)
        else
            t=(simt-simt_retro_t0)/(simt_retro_t1-simt_retro_t0)
            L=(1-t)*simt_retro_L0+t*simt_retro_L1
            vi:set_thrustergrouplevel(THGROUP.HOVER,L)
        end

    end
end


function clbk_prestep(simt, simdt, mjd)
    -- Animations
    vi:set_emptymass(calc_emptymass())

    anim_status_propagate(gear_status,simdt)
    anim_status_propagate(ant_status,simdt)
    anim_status_propagate(scoop_status,simdt)

    steer(simt)
end


