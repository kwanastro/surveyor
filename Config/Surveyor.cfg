--For deploy/stow animations:
-- * Model shows deployed configuration
-- * deployed is animation progress 0.0
-- * stowed is animation progress 1.0
-- * deploying decreases animation progress
-- * stwoing increases animation progress
local ANIM_STATE       = {
    DEPLOYED = 0,
    STOWED = 1,
    DEPLOYING = 2,
    STOWING = 3
}

local TRI32=math.sqrt(3.0)/2.0

-- Vessel parameters
local LANDER_EMPTY_MASS=289.10
local RETRO_EMPTY_MASS = 64.88
local AMR_MASS = 3.82

local RETRO_PROP_MASS=560.64
local RETRO_STA   = -1.028
local thrust_curve={
    --From Docs/Surveyor Retro Thrust.ods
    {t= 0.00,F=    0},
    {t= 0.37,F=34487},
    {t= 1.87,F=35572},
    {t= 4.50,F=37232},
    {t= 7.50,F=38993},
    {t=10.00,F=39562},
    {t=13.03,F=39923},
    {t=15.71,F=41271},
    {t=18.24,F=42925},
    {t=20.00,F=43392},
    {t=23.59,F=43650},
    {t=26.78,F=43757},
    {t=30.00,F=43650},
    {t=33.53,F=43183},
    {t=35.31,F=42721},
    {t=35.88,F=42307},
    {t=36.16,F=41582},
    {t=36.81,F=35368},
    {t=37.52,F=26511},
    {t=38.36,F=17553},
    {t=38.83,F=12424},
    {t=39.39,F= 8696},
    {t=40.00,F= 6263},
    {t=41.51,F= 3363},
    {t=43.38,F= 1294},
    {t=45.26,F=  205},
    {t=46.48,F=    0},
    {t=49.95,F=    0},
}

local max_retro_thr=0
for i,row in pairs(thrust_curve) do
    if row.F>max_retro_thr then
        max_retro_thr=row.F
    end
end
local retro_itot=0
for i,row in pairs(thrust_curve) do
    if i>1 then
        local this_retro_imp=(thrust_curve[i-1].F+thrust_curve[i].F)/2*(thrust_curve[i].t-thrust_curve[i-1].t)
        retro_itot=retro_itot+this_retro_imp
    end
    row.L=row.F/max_retro_thr
end
local retro_isp   = retro_itot/RETRO_PROP_MASS

local VERNIER_PROP_MASS = 70.98
local VERNIER_ISP = 3200
local VERNIER_THRUST = 463
local VERNIER_RAD = 1.09
local VERNIER_STA = -0.504

local RCS_PROP_MASS=2
local RCS_ISP = 630.0
local RCS_THRUST = 0.25
local RCS_RAD = 1.852
local RCS_STA = -0.653
local RCS_SPACE = 0.1

local LEG_RAD       =  2.052
local LEG_STA       = -0.792
local LEG_PIVOT_RAD =  1.119
local LEG_PIVOT_STA = -0.33


--vehicle state
local self              = {
    gear_status = { progress = 0.0, state = ANIM_STATE.DEPLOYED, tag = "GEAR", time = 0.5, anim = nil },
    ant_status = { progress = 0.0, state = ANIM_STATE.DEPLOYED, tag = "ANT", time = 0.5, anim = nil },
    scoop_status = { progress = 0.0, state = ANIM_STATE.STOWED, tag = "SCOOP", time = 15, anim = nil },
    --retro solid rocket motor thrust curve state
    simt_retro_start=nil,
    simt_retro_t0=0,
    simt_retro_L0=nil,
    simt_retro_t1=nil,
    simt_retro_L1=nil,
    retro_current_seg = 0,
    --propellant handles
    ph_vernier = nil,
    ph_rcs = nil,
    ph_retro = nil,
    --thruster handles
    th_vernier = nil,
    th_rcs = nil,
    th_retro=nil
}


local function anim_status_savestate(scn,status)
  oapi.writescenario_string(scn, status.tag,   status.state   .. " " .. status.progress)
end

local function anim_status_propagate(status,simdt)
    local da = simdt / status.time
    local function Sproing(progress)
        return 1-(math.cos(PI*progress)/2.0+0.5)
    end
    if status.state == ANIM_STATE.STOWING then
        if status.progress < 1.0 then
            status.progress=math.min(1.0, status.progress + da)
        else
            status.state = ANIM_STATE.STOWED
        end
        vi:set_animation(status.anim,Sproing(status.progress))
    elseif status.state == ANIM_STATE.DEPLOYING then
        if status.progress > 0.0 then
            status.progress = math.max(0.0, status.progress - da)
        else
            status.state = ANIM_STATE.DEPLOYED
        end
        vi:set_animation(status.anim, Sproing(status.progress))
    end
end

-- helper function to create an iterator usable in a for loop
local function iterate_lines(scn)
    return function()
              return oapi.readscenario_nextline(scn)
           end
end

--@callback
function clbk_loadstateex(scn, vs)
  for line in iterate_lines(scn) do
       local kw, state, progress = line:match("(%S+) (%d) (%S+)")
       if kw == "GEAR" then
           self.gear_status.state=tonumber(state)
           self.gear_status.progress = tonumber(progress)
           anim_status_propagate(self.gear_status,0)
       else
           vi:parse_scenario_line_ex(line, vs)
       end
  end
end

