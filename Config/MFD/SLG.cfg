-- Returns string like "123.456", "123.456 M", or "123.456 μ"
-- Always: exactly 3 decimals, coefficient 1.000-999.999, metric prefixes
local function eng_format(value)
    if value == 0 then
        return "0.000  "
    end
    
    local sign = value < 0 and "-" or " "
    local abs_value = math.abs(value)
    
    -- Engineering exponent (multiple of 3)
    local log_val = math.log10(abs_value)
    local exponent = math.floor(log_val / 3) * 3
    local scaled = abs_value / (10 ^ exponent)
    
    -- Safety clamp for floating-point edge cases (e.g. 999.999999 → 1.000 k)
    if scaled >= 1000 then
        scaled = scaled / 1000
        exponent = exponent + 3
    elseif scaled < 1 then
        scaled = scaled * 1000
        exponent = exponent - 3
    end
    
    local formatted = string.format("%7.3f", scaled)
    
    -- Full metric prefixes (positive & negative)
    local prefixes = {
        [24] = "Y", [21] = "Z", [18] = "E", [15] = "P", [12] = "T",
        [9]  = "G", [6]  = "M", [3]  = "k",  [0]  = " ",
        [-3] = "m", [-6] = "\181", [-9] = "n",  [-12]= "p",
        [-15]= "f", [-18]= "a", [-21]= "z",  [-24]= "y"
    }
    
    local prefix = prefixes[exponent] or string.format("e%+d", exponent)
    
    return sign .. formatted .. " " .. prefix
end


