local VERNIER_THRUST = 463
local AltMark=92000

local DescentCurveSpd={ 1.5, 3, 30, 120,  210,  250};
local DescentCurveAlt={13.0,15,300,4000,13000,20000};

MaxSpd=250
MaxAlt=25000
MaxSpd2=40
MaxAlt2=800

STATE={
  IDLE=0,
  WAITING_FOR_ALT_MARK=1,
  WAITING_FOR_PRERETRO=2,
  PRERETRO=3,
  RETRO=4,
  DROP_TO_CURVE=5,
  RIDE_CURVE=6,
  CONSTANT_VEL=7,
  DONE=8
}

STATE_NAME={
  [STATE.IDLE]                ="Idle",
  [STATE.WAITING_FOR_ALT_MARK]="Waiting for altitude mark",
  [STATE.WAITING_FOR_PRERETRO]="Have Alt Mark, waiting for preretro",
  [STATE.PRERETRO]            ="Pre-retro, starting verniers",
  [STATE.RETRO]               ="Retro burn",
  [STATE.DROP_TO_CURVE]       ="Drop to descent curve",
  [STATE.RIDE_CURVE]          ="Ride descent curve",
  [STATE.CONSTANT_VEL]        ="Constant velocity",
  [STATE.DONE]                ="Done"
}

local self={
  --mfd window size
  width=nil,
  height=nil,
  --steering command values for ground-relative retrograde
  pitchcmd=nil,
  yawcmd=nil,
  pitchrate=nil,
  yawrate=nil,
  pitcherr=nil,
  yawerr=nil,
  --flags indicating whether auto features are enabled
  auto_retrograde=false,
  auto_throttle=false,
  --state machine
  sequence=STATE.WAITING_FOR_ALT_MARK,
  simt_timer=nil,
  --navigation state
  slant =nil, --slant range to target
  vel_b =nil, --velocity vector in body frame
  alt   =nil, --altitude above terrain
  r     =nil, --distance from spacecraft to center of planet
  r_topo=nil, --distance from terrain to center of planet
  rate  =nil, --rotation rate in body frame
  slant_factor=nil, -- cosine factor for slant range
  --Impact prediction
  ta     =nil,
  ta_imp =nil,
  M      =nil,
  Mimp   =nil,
  epoch  =nil,
  tgo_imp=nil,--time from now to impact, should always be positive
  fpa_imp=nil,--impact flight path angle, should be negative and often close to -90deg
  v_imp  =nil,--inertial speed at impact, should be positive
  --vessel interface
  vi = vessel.get_focusinterface()
}

local function DX(x, scale)
  if scale == 1 then
    return math.floor(self.height*x/MaxSpd);
  else
    return math.floor(self.height*x/MaxSpd2);
  end
end

local function DY(y, scale )
  if scale == 1 then
    return math.floor(self.height*(1-y/MaxAlt));
  else
    return math.floor(self.height*(1-y/MaxAlt2));
  end
end

local function TPIR(X) 
--  dbg="x[1] "..DescentCurveSpd[1]
  for i=1,#DescentCurveSpd-1 do
--    dbg=dbg.." X "..eng_format(X).." x["..(i+1).."] "..DescentCurveSpd[i+1]
--    oapi.dbg_out(dbg)
    if(DescentCurveSpd[i]<=X and DescentCurveSpd[i+1]>X) then 
      return i
    end
  end
  return -1;
end

local function linterp(x0,y0,x1,y1,x)
  local t=(x-x0)/(x1-x0)
  return y0*(1-t)+y1*t
end

-- Poke hyperbolic inverse functions in as needed
if not math.asinh then
    math.asinh = function(x)
        return math.log(x + math.sqrt(x * x + 1))
    end
end

if not math.acosh then
    math.acosh = function(x)
        return math.log(x + math.sqrt(x * x - 1))
    end
end

if not math.atanh then
    math.atanh = function(x)
        return 0.5 * math.log((1 + x) / (1 - x))
    end
end

local function calcTA(a,e,r)
  return math.acos(a*(1-e*e)/(r*e)-1/e);
end

local function calcEA(e,ta)
  if(e<1) then
    return 2*math.atan(math.sqrt((1-e)/(1+e))*math.tan(ta/2));
  else
    sE=-math.sin(ta)*math.sqrt(e*e-1)/(1+e*math.cos(ta));
    return math.asinh(sE);
  end
end

local function calcM(e, E)
  if(e<1) then
    return E-e*math.sin(E);
  else
    return e*math.sinh(E)-E;
  end
end

local function calc_impact()
  local el=nil
  el,self.epoch=self.vi:get_elements()
  self.ta=calcTA(el.a,el.e,self.r);
  self.ta_imp=calcTA(el.a,el.e,self.r_topo);
  --  if(taImp<ta) taImp=2*PI-taImp;
  local sign=nil
  if el.e>1 then
    sign=-1
  else
    sign=1
  end
  local n=math.sqrt(sign*mu/(el.a*el.a*el.a));
  local E=calcEA(el.e,self.ta);
  local EImp=calcEA(el.e,self.ta_imp);
  self.M=calcM(el.e,E);
  if(el.e<1 and self.M<0) then
    self.M=self.M+2*PI;
  end
  self.MImp=calcM(el.e,EImp);
  if(el.e<1 and self.MImp<0) then
    self.MImp=self.MImp+2*PI;
  end
  self.v_imp=math.sqrt(2*mu/self.r_topo-mu/el.a);
  local sfpaImp=nil
  local cfpaImp=nil;
  if(el.e<1) then
    sfpaImp=el.e*math.sin(EImp)/math.sqrt(1-math.pow(el.e*math.cos(EImp),2));
    cfpaImp=math.sqrt((1-el.e*el.e)/(1-math.pow(el.e*math.cos(EImp),2)));
  else
    sfpaImp=-el.e*math.sinh(EImp)/math.sqrt(math.pow(el.e*math.cosh(EImp),2)-1);
    cfpaImp=math.sqrt((el.e*el.e-1)/(math.pow(el.e*math.cosh(EImp),2)-1));
  end
  self.fpa_imp=-math.atan2(sfpaImp,cfpaImp);
  self.tgo_imp=(self.MImp-self.M)/n;

end

-- Draw the MFD every frame
---callback
function update(skp)
  local ch, cw = skp:get_charsize()
  mfd:set_title(skp, "Surveyor Landing Guidance")
  skp:text(cw*1, ch*1, STATE_NAME[self.sequence])
  self.width,self.height=mfd:get_size()

  -- Groundspeed in local frame
  self.vel_b=self.vi:get_groundspeedvector(REFFRAME.LOCAL)

  skp:text(cw*1, ch*2, "Slant Range:  "..eng_format(self.slant).."m")
  skp:text(cw*1, ch*3, "vspd:         "..eng_format(self.vel_b.z).."m/s")
    
  local Idx=TPIR(-self.vel_b.z)
  local DesiredAlt=nil
  if(Idx>=1) then
    DesiredAlt=linterp(DescentCurveSpd[Idx],DescentCurveAlt[Idx],DescentCurveSpd[Idx+1],DescentCurveAlt[Idx+1],-self.vel_b.z);
    skp:text(cw*1, ch*4, "Alt Error:   "..eng_format(self.alt-DesiredAlt).."m")
  else
    DesiredAlt=DescentCurveAlt[#DescentCurveSpd];
  end
 
  -- draw descent curve
  local scale
  if -self.vel_b.z>MaxSpd2 or self.slant>MaxAlt2 then
    scale=1
  else
    scale=2
  end
  skp:moveto(DX(DescentCurveSpd[0+1],scale),DY(DescentCurveAlt[0+1],scale));
  for i=2,#DescentCurveAlt do
    skp:lineto(DX(DescentCurveSpd[i],scale),DY(DescentCurveAlt[i],scale));
  end
  
  local function draw_mark(spd,alt)
    skp:moveto(DX(spd,scale)-5,DY(alt,scale));
    skp:lineto(DX(spd,scale)+6,DY(alt,scale));
    skp:moveto(DX(spd,scale),DY(alt,scale)-5);
    skp:lineto(DX(spd,scale),DY(alt,scale)+6);
  end


  draw_mark(-self.vel_b.z,self.slant)
  local mass=self.vi:get_mass()
  local throttle=self.vi:get_thrustergrouplevel(THGROUP.MAIN)

  local thrust=3*VERNIER_THRUST*throttle
  local thr_acc=thrust/mass
  local acc=thr_acc-g
  local function predict(dt)
    local predspd=self.vel_b.z+acc*dt
    local predalt=self.slant+self.vel_b.z*dt+acc*dt*dt/2
    draw_mark(-predspd,predalt)
  end
  predict( 5)
  predict(10)
  predict(15)

  if self.auto_retrograde then
    skp:text(cw*1, ch*13, "Retrograde attitude ENABLED")
  else
    skp:text(cw*1, ch*13, "Retrograde attitude disabled")
  end  
  if self.auto_throttle then
    skp:text(cw*1, ch*14, "Auto Throttle       ENABLED")
  else
    skp:text(cw*1, ch*14, "Auto Throttle       disabled")
  end  

  calc_impact()
  skp:text(cw*1, ch*15, "Impact TGo:  "..eng_format(self.tgo_imp).."s");
  skp:text(cw*1, ch*16, "       fpa:  "..eng_format(self.fpa_imp*DEG).."\176");
  skp:text(cw*1, ch*17, "       v:    "..eng_format(self.v_imp).."m/s")
  return true
end

local function navigate()
  --calculate slant range and velocity vector in body frame. In real Surveyor,
  --the multibeam radar does exactly this. Also calculates the attitude rate,
  --which would be generated by gyros in Surveyor.
  local Planet=self.vi:get_gravityref()
  local r_planet=oapi.get_size(Planet)
  mu=GGRAV*oapi.get_mass(Planet);
  g=mu/(r_planet*r_planet);
 
  local r=self.vi:get_relativepos(Planet);
  self.r=vec.length(r);
  self.alt=self.vi:get_altitude(ALTMODE.GROUND);
  self.r_topo=self.r-self.alt
  local Pitch=self.vi:get_pitch()
  self.slant_factor=math.sin(Pitch);
  self.slant=self.alt/self.slant_factor;

  self.rate=self.vi:get_angvel()
  self.vel_b=self.vi:get_groundspeedvector(REFFRAME.LOCAL)
end

local function steer_retro()
  -- DA RULES
  ---- + on rate is + direction of axis
  ---- positive cmd must increase rate
  ---- if rate is positive, error must increase
  -- Observed
  ---- Pitch positive rate is pitch up
  ---- Pitch error needs minus sign 
  ---- Pitch positive error is nose above target
  ---- Yaw positive rate is yaw left
  ---- Yaw positive error is nose to left of target
  -- Conclusion
  ---- Both k_ constants should be negative, since positive error or rate need negative command
  self.pitcherr=-self.vel_b.y/self.vel_b.z
  self.yawerr=self.vel_b.x/self.vel_b.z
  self.pitchrate=self.rate.x
  self.yawrate=self.rate.y
  local k_P=-200
  local k_D=-200
  self.pitchcmd=math.max(-1,math.min(1,k_P*self.pitcherr+k_D*self.rate.x))
  self.yawcmd  =math.max(-1,math.min(1,k_P*self.yawerr  +k_D*self.rate.y))
  if self.auto_retrograde then
    if self.pitchcmd>0 then
      self.vi:set_thrustergrouplevel(THGROUP.ATT_PITCHUP,self.pitchcmd)
      self.vi:set_thrustergrouplevel(THGROUP.ATT_PITCHDOWN,0)
    else
      self.vi:set_thrustergrouplevel(THGROUP.ATT_PITCHUP,0)
      self.vi:set_thrustergrouplevel(THGROUP.ATT_PITCHDOWN,-self.pitchcmd)
    end
    if self.yawcmd>0 then
      self.vi:set_thrustergrouplevel(THGROUP.ATT_YAWLEFT,self.yawcmd)
      self.vi:set_thrustergrouplevel(THGROUP.ATT_YAWRIGHT,0)
    else
      self.vi:set_thrustergrouplevel(THGROUP.ATT_YAWLEFT,0)
      self.vi:set_thrustergrouplevel(THGROUP.ATT_YAWRIGHT,-self.yawcmd)
    end
  end

end

local function alt_on_descent_curve(spd)
    local Idx=TPIR(spd);
    local DesiredAlt=nil
    if Idx>=0 then
       DesiredAlt=linterp(DescentCurveSpd[Idx  ],DescentCurveAlt[Idx  ],
                          DescentCurveSpd[Idx+1],DescentCurveAlt[Idx+1],
                          spd);
    else
       DesiredAlt=DescentCurveAlt[#DescentCurveAlt];
    end
    return DesiredAlt,Idx
end

local function auto_sequence(simt)
  local ThrCommand=0
  local ThrMotor=0
  if self.sequence==STATE.IDLE then
    --pass
  elseif self.sequence==STATE.WAITING_FOR_ALT_MARK then
    if self.slant<AltMark then
      self.simt_timer=simt+7
      self.sequence=STATE.WAITING_FOR_PRERETRO
    end
  elseif self.sequence==STATE.WAITING_FOR_PRERETRO then
    if simt>self.simt_timer then
      self.simt_timer=simt+1.1
      self.sequence=STATE.PRERETRO
    end
  elseif self.sequence==STATE.PRERETRO then
    ThrCommand=0.8
    if simt>self.simt_timer then
      ThrMotor=1
      self.simt_timer=simt+41
      self.sequence=STATE.RETRO
    end
  elseif self.sequence==STATE.RETRO then
    ThrCommand=0.8
    if simt>self.simt_timer then
      self.sequence=STATE.DROP_TO_CURVE
    end
  elseif self.sequence==STATE.DROP_TO_CURVE then
    --calculate vernier thrust to get 90%g (so downward acceleration is 10%g)
    local mass=self.vi:get_mass();
    local DesiredAcc=0.9*g;
    local Thr=DesiredAcc*mass;
    ThrCommand=Thr/(VERNIER_THRUST*3);
    --calculate desired alt for current speed
    local DesiredAlt,_=alt_on_descent_curve(-self.vel_b.z)
    --if at or below desired alt, advance state to RIDE_CURVE
    if(self.slant<DesiredAlt) then
      self.sequence=STATE.RIDE_CURVE;
    end
  elseif self.sequence==STATE.RIDE_CURVE then
    local DesiredAlt,Idx=alt_on_descent_curve(-self.vel_b.z)
    if Idx<0 then
      ThrCommand=0
    else
      --calculate vernier thrust to ride curve
      local ddxdh=(DescentCurveSpd[Idx+1]-DescentCurveSpd[Idx])/(DescentCurveAlt[Idx+1]-DescentCurveAlt[Idx]);
      DesiredAcc=ddxdh*-self.vel_b.z;
      local mass=self.vi:get_mass();
      local Thr=(DesiredAcc+g/self.slant_factor)*mass;
      ThrCommand=Thr/(VERNIER_THRUST*3)-3*(self.slant-DesiredAlt)/self.slant;
    end
    if -self.vel_b.z<DescentCurveSpd[1] then
      self.sequence=STATE.CONSTANT_VEL
    end
  elseif self.sequence==STATE.CONSTANT_VEL then
    --calculate vernier thrust to zero out acceleration
    local mass=self.vi:get_mass();
    local DesiredAcc=g;
    local Thr=DesiredAcc*mass;
    ThrCommand=Thr/(VERNIER_THRUST*3);
    if(self.slant<4) then
      self.sequence=STATE.DONE
    end
  elseif self.sequence==STATE.DONE then
    -- don't do anything
    if self.auto_throttle then
      self.vi:set_thrustergrouplevel(THGROUP.MAIN,0)
    end
    self.auto_throttle=false
    self.auto_retrograde=false
    self.vi:set_thrustergrouplevel(THGROUP.ATT_PITCHUP,0)
    self.vi:set_thrustergrouplevel(THGROUP.ATT_PITCHDOWN,0)
    self.vi:set_thrustergrouplevel(THGROUP.ATT_YAWRIGHT,0)
    self.vi:set_thrustergrouplevel(THGROUP.ATT_YAWLEFT,0)
  end
  if self.auto_throttle then
    self.vi:set_thrustergrouplevel(THGROUP.MAIN,ThrCommand)
    if ThrMotor>0 then
      self.vi:set_thrustergrouplevel(THGROUP.HOVER,1)
    end
  end
end

---callback
function prestep(simt,simdt,mjd)
  navigate()  
  steer_retro()
  auto_sequence(simt)
end

-- Handle button presses
---callback
function consumebutton(bt, event)
  if bt == 0 and event%PANEL_MOUSE.LBPRESSED == PANEL_MOUSE.LBDOWN then
    self.auto_retrograde=not self.auto_retrograde
    self.vi:set_thrustergrouplevel(THGROUP.ATT_PITCHUP,0)
    self.vi:set_thrustergrouplevel(THGROUP.ATT_PITCHDOWN,0)
    self.vi:set_thrustergrouplevel(THGROUP.ATT_YAWRIGHT,0)
    self.vi:set_thrustergrouplevel(THGROUP.ATT_YAWLEFT,0)

    return true
  elseif bt == 1 and event%PANEL_MOUSE.LBPRESSED == PANEL_MOUSE.LBDOWN then
    self.auto_throttle=not self.auto_throttle
    self.vi:set_thrustergrouplevel(THGROUP.MAIN,0)

    return true
  elseif bt == 11 and event%PANEL_MOUSE.LBPRESSED == PANEL_MOUSE.LBDOWN then
    -- CLR button: just refresh
    mfd:invalidate_display()
    return true
  end
  return false
end
