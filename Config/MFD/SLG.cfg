PRE_RETRO_T=1.1;
R10=0.294784580498866; --Thrust curve curvature
SAFETY_MARGIN=1000;   --Design retro such that it ends this many
                      --meters above the thrust curve
AltMark=92000

DescentCurveSpd={ 1.5, 3, 30, 120,  210,  250};
DescentCurveAlt={13.0,15,300,4000,13000,20000};

MaxSpd=250
MaxAlt=25000
MaxSpd2=40
MaxAlt2=800
width=nil
height=nil
spd=nil
pitchcmd=nil
yawcmd=nil
pitchrate=nil
yawrate=nil
pitcherr=nil
yawerr=nil
auto_retrograde=false
auto_throttle=false

function DX(x, scale)
  if scale == 1 then
    return math.floor(height*x/MaxSpd);
  else
    return math.floor(height*x/MaxSpd2);
  end
end

function DY(y, scale )
  if scale == 1 then
    return math.floor(height*(1-y/MaxAlt));
  else
    return math.floor(height*(1-y/MaxAlt2));
  end
end

function TPIR(X) 
--  dbg="x[1] "..DescentCurveSpd[1]
  for i=1,#DescentCurveSpd-1 do
--    dbg=dbg.." X "..eng_format(X).." x["..(i+1).."] "..DescentCurveSpd[i+1]
--    oapi.dbg_out(dbg)
    if(DescentCurveSpd[i]<=X and DescentCurveSpd[i+1]>X) then 
      return i
    end
  end
  return -1;
end

function linterp(x0,y0,x1,y1,x)
  local t=(x-x0)/(x1-x0)
  return y0*(1-t)+y1*t
end

function mark(skp,spd,alt,scale)
  skp:moveto(DX(spd,scale)-5,DY(alt,scale));
  skp:lineto(DX(spd,scale)+6,DY(alt,scale));
  skp:moveto(DX(spd,scale),DY(alt,scale)-5);
  skp:lineto(DX(spd,scale),DY(alt,scale)+6);
end

-- Poke hyperbolic inverse functions in as needed
if not math.asinh then
    math.asinh = function(x)
        return math.log(x + math.sqrt(x * x + 1))
    end
end

if not math.acosh then
    math.acosh = function(x)
        return math.log(x + math.sqrt(x * x - 1))
    end
end

if not math.atanh then
    math.atanh = function(x)
        return 0.5 * math.log((1 + x) / (1 - x))
    end
end

function calcTA(a,e,r)
  return math.acos(a*(1-e*e)/(r*e)-1/e);
end

function calcEA(e,ta)
  if(e<1) then
    return 2*math.atan(math.sqrt((1-e)/(1+e))*math.tan(ta/2));
  else
    sE=-math.sin(ta)*math.sqrt(e*e-1)/(1+e*math.cos(ta));
    return math.asinh(sE);
  end
end

function calcM(e, E)
  if(e<1) then
    return E-e*math.sin(E);
  else
    return e*math.sinh(E)-E;
  end
end

function calc_impact()
  el,epoch=vi:get_elements()
  ta=calcTA(el.a,el.e,dist);
  taImp=calcTA(el.a,el.e,PlanetRad);
  --  if(taImp<ta) taImp=2*PI-taImp;
  if el.e>1 then
    sign=-1
  else
    sign=1
  end
  n=math.sqrt(sign*mu/(el.a*el.a*el.a));
  E=calcEA(el.e,ta);
  EImp=calcEA(el.e,taImp);
  M=calcM(el.e,E);
  if(el.e<1 and M<0) then
    M=M+2*PI;
  end
  MImp=calcM(el.e,EImp);
  if(el.e<1 and MImp<0) then
    MImp=MImp+2*PI;
  end
  vImp=-math.sqrt(2*mu/PlanetRad-mu/el.a);
  sfpaImp=nil
  cfpaImp=nil;
  if(el.e<1) then
    sfpaImp=el.e*math.sin(EImp)/math.sqrt(1-math.pow(el.e*math.cos(EImp),2));
    cfpaImp=math.sqrt((1-el.e*el.e)/(1-math.pow(el.e*math.cos(EImp),2)));
  else
    sfpaImp=-el.e*math.sinh(EImp)/math.sqrt(math.pow(el.e*math.cosh(EImp),2)-1);
    cfpaImp=math.sqrt((el.e*el.e-1)/(math.pow(el.e*math.cosh(EImp),2)-1));
  end
  fpaImp=-math.atan2(sfpaImp,cfpaImp);
  TGoImp=(MImp-M)/n;

end

-- Draw the MFD every frame
function update(skp)
  local ch, cw = skp:get_charsize()
  mfd:set_title(skp, "Surveyor Landing Guidance")
  skp:text(cw*1, ch*1, STATE_NAME[sequence])
  width,height=mfd:get_size()


  -- Groundspeed in local frame
  spd=vi:get_groundspeedvector(REFFRAME.LOCAL)

  skp:text(cw*1, ch*2, "Slant Range:  "..eng_format(Slant).."m")
  skp:text(cw*1, ch*3, "vspd    :  "..eng_format(spd.z).."m/s")
    
  Idx=TPIR(-spd.z)
  if(Idx>=1) then
    DesiredAlt=linterp(DescentCurveSpd[Idx],DescentCurveAlt[Idx],DescentCurveSpd[Idx+1],DescentCurveAlt[Idx+1],-spd.z);
    skp:text(cw*1, ch*4, "Alt Error:  "..eng_format(Alt-DesiredAlt).."m")
  else
    DesiredAlt=DescentCurveAlt[#DescentCurveSpd];
  end
 
  -- draw descent curve
  local scale
  if -spd.z>MaxSpd2 or Slant>MaxAlt2 then
    scale=1
  else
    scale=2
  end
  skp:moveto(DX(DescentCurveSpd[0+1],scale),DY(DescentCurveAlt[0+1],scale));
  for i=2,#DescentCurveAlt do
    skp:lineto(DX(DescentCurveSpd[i],scale),DY(DescentCurveAlt[i],scale));
  end
  
  mark(skp,-spd.z,Slant,scale)
  local mass=vi:get_mass()
  local throttle=vi:get_thrustergrouplevel(THGROUP.MAIN)
  VERNIER_THRUST = 463

  local thrust=3*VERNIER_THRUST*throttle
  local thr_acc=thrust/mass
  local acc=thr_acc-g
  dt=5
  local predspd=spd.z+acc*dt
  local predalt=Slant+spd.z*dt+acc*dt*dt/2
  mark(skp,-predspd,predalt,scale)
  dt=10
  local predspd=spd.z+acc*dt
  local predalt=Slant+spd.z*dt+acc*dt*dt/2
  mark(skp,-predspd,predalt,scale)
  dt=15
  local predspd=spd.z+acc*dt
  local predalt=Slant+spd.z*dt+acc*dt*dt/2
  mark(skp,-predspd,predalt,scale)

  if auto_retrograde then
    skp:text(cw*1, ch*13, "Retrograde attitude ENABLED")
  else
    skp:text(cw*1, ch*13, "Retrograde attitude disabled")
  end  
  if auto_throttle then
    skp:text(cw*1, ch*14, "Auto Throttle       ENABLED")
  else
    skp:text(cw*1, ch*14, "Auto Throttle       disabled")
  end  

  calc_impact()
  skp:text(cw*1, ch*15, "Impact TGo:  "..eng_format(TGoImp).."s");
  skp:text(cw*1, ch*16, "       fpa:  "..eng_format(fpaImp*DEG).."°");
  skp:text(cw*1, ch*17, "       v:    "..eng_format(vImp).."m/s")

  return true
end

function navigate()
  --calculate slant range and velocity vector in body frame. In real Surveyor,
  --the multibeam radar does exactly this. Also calculates the attitude rate,
  --which would be generated by gyros in Surveyor.
  Planet=vi:get_gravityref()
  PlanetRad=oapi.get_size(Planet)
  mu=GGRAV*oapi.get_mass(Planet);
  g=mu/(PlanetRad*PlanetRad);
  vcirc=math.sqrt(mu/PlanetRad);
 
  local r=vi:get_relativepos(Planet,r);
  dist=vec.length(r);
  Alt=vi:get_altitude(ALTMODE.GROUND);
  local Pitch=vi:get_pitch()
  SlantFactor=math.sin(Pitch);
  Slant=Alt/SlantFactor;

  rate=vi:get_angvel()
  spd=vi:get_groundspeedvector(REFFRAME.LOCAL)
end

function steer_retro()
  -- DA RULES
  ---- + on rate is + direction of axis
  ---- positive cmd must increase rate
  ---- if rate is positive, error must increase
  -- Observed
  ---- Pitch positive rate is pitch up
  ---- Pitch error needs minus sign 
  ---- Pitch positive error is nose above target
  ---- Yaw positive rate is yaw left
  ---- Yaw positive error is nose to left of target
  -- Conclusion
  ---- Both k_ constants should be negative, since positive error or rate need negative command
  pitcherr=-spd.y/spd.z
  yawerr=spd.x/spd.z
  pitchrate=rate.x
  yawrate=rate.y
  local k_P=-200
  local k_D=-200
  pitchcmd=math.max(-1,math.min(1,k_P*pitcherr+k_D*rate.x))
  yawcmd  =math.max(-1,math.min(1,k_P*yawerr  +k_D*rate.y))
  if auto_retrograde then
    if pitchcmd>0 then
      vi:set_thrustergrouplevel(THGROUP.ATT_PITCHUP,pitchcmd)
      vi:set_thrustergrouplevel(THGROUP.ATT_PITCHDOWN,0)
    else
      vi:set_thrustergrouplevel(THGROUP.ATT_PITCHUP,0)
      vi:set_thrustergrouplevel(THGROUP.ATT_PITCHDOWN,-pitchcmd)
    end
    if yawcmd>0 then
      vi:set_thrustergrouplevel(THGROUP.ATT_YAWLEFT,yawcmd)
      vi:set_thrustergrouplevel(THGROUP.ATT_YAWRIGHT,0)
    else
      vi:set_thrustergrouplevel(THGROUP.ATT_YAWLEFT,0)
      vi:set_thrustergrouplevel(THGROUP.ATT_YAWRIGHT,-yawcmd)
    end
  end

end

STATE={
  IDLE=0,
  WAITING_FOR_ALT_MARK=1,
  WAITING_FOR_PRERETRO=2,
  PRERETRO=3,
  RETRO=4,
  DROP_TO_CURVE=5,
  RIDE_CURVE=6,
  CONSTANT_VEL=7,
  DONE=8
}

STATE_NAME={
  [STATE.IDLE]                ="Idle",
  [STATE.WAITING_FOR_ALT_MARK]="Waiting for altitude mark",
  [STATE.WAITING_FOR_PRERETRO]="Have Alt Mark, waiting for preretro",
  [STATE.PRERETRO]            ="Pre-retro, starting verniers",
  [STATE.RETRO]               ="Retro burn",
  [STATE.DROP_TO_CURVE]       ="Drop to descent curve",
  [STATE.RIDE_CURVE]          ="Ride descent curve",
  [STATE.CONSTANT_VEL]        ="Constant velocity",
  [STATE.DONE]                ="Done"
}
sequence=STATE.WAITING_FOR_ALT_MARK
simt_timer=nil

function alt_on_descent_curve(spd)
    local Idx=TPIR(spd);
    local DesiredAlt=nil
    if Idx>=0 then
       DesiredAlt=linterp(DescentCurveSpd[Idx  ],DescentCurveAlt[Idx  ],
                          DescentCurveSpd[Idx+1],DescentCurveAlt[Idx+1],
                          spd);
    else
       DesiredAlt=DescentCurveAlt[#DescentCurveAlt];
    end
    return DesiredAlt,Idx
end

function auto_sequence(simt)
  ThrCommand=0
  ThrMotor=0
  if sequence==STATE.IDLE then
    --pass
  elseif sequence==STATE.WAITING_FOR_ALT_MARK then
    if Slant<AltMark then
      simt_timer=simt+7
      sequence=STATE.WAITING_FOR_PRERETRO
    end
  elseif sequence==STATE.WAITING_FOR_PRERETRO then
    if simt>simt_timer then
      simt_timer=simt+1.1
      sequence=STATE.PRERETRO
    end
  elseif sequence==STATE.PRERETRO then
    ThrCommand=0.8
    if simt>simt_timer then
      ThrMotor=1
      simt_timer=simt+41
      sequence=STATE.RETRO
    end
  elseif sequence==STATE.RETRO then
    ThrCommand=0.8
    if simt>simt_timer then
      sequence=STATE.DROP_TO_CURVE
    end
  elseif sequence==STATE.DROP_TO_CURVE then
    --calculate vernier thrust to get 90%g (so downward acceleration is 10%g)
    local mass=vi:get_mass();
    local DesiredAcc=0.9*g;
    local Thr=DesiredAcc*mass;
    ThrCommand=Thr/(VERNIER_THRUST*3);
    --calculate desired alt for current speed
    DesiredAlt,_=alt_on_descent_curve(-spd.z)
    --if at or below desired alt, advance state to RIDE_CURVE
    if(Slant<DesiredAlt) then
      sequence=STATE.RIDE_CURVE;
    end
  elseif sequence==STATE.RIDE_CURVE then
    DesiredAlt,Idx=alt_on_descent_curve(-spd.z)
    if Idx<0 then
      ThrCommand=0
    else
      --calculate vernier thrust to ride curve
      local ddxdh=(DescentCurveSpd[Idx+1]-DescentCurveSpd[Idx])/(DescentCurveAlt[Idx+1]-DescentCurveAlt[Idx]);
      DesiredAcc=ddxdh*-spd.z;
      local mass=vi:get_mass();
      local Thr=(DesiredAcc+g/SlantFactor)*mass;
      ThrCommand=Thr/(VERNIER_THRUST*3)-3*(Slant-DesiredAlt)/Slant;
    end
    if -spd.z<DescentCurveSpd[1] then
      sequence=STATE.CONSTANT_VEL
    end
  elseif sequence==STATE.CONSTANT_VEL then
    --calculate vernier thrust to zero out acceleration
    local mass=vi:get_mass();
    local DesiredAcc=g;
    local Thr=DesiredAcc*mass;
    ThrCommand=Thr/(VERNIER_THRUST*3);
    if(Slant<4) then
      sequence=STATE.DONE
    end
  elseif sequence==STATE.DONE then
    -- don't do anything
    if auto_throttle then
      vi:set_thrustergrouplevel(THGROUP.MAIN,0)
    end
    auto_throttle=false
    auto_retrograde=false
    vi:set_thrustergrouplevel(THGROUP.ATT_PITCHUP,0)
    vi:set_thrustergrouplevel(THGROUP.ATT_PITCHDOWN,0)
    vi:set_thrustergrouplevel(THGROUP.ATT_YAWRIGHT,0)
    vi:set_thrustergrouplevel(THGROUP.ATT_YAWLEFT,0)
  end
  if auto_throttle then
    vi:set_thrustergrouplevel(THGROUP.MAIN,ThrCommand)
    if ThrMotor>0 then
      local hretro=vi:get_thrusterhandle(0)
      vi:set_thrusterlevel(hretro,1)
    end
  end
end


function prestep(simt,simdt,mjd)
  navigate()  
  steer_retro()
  auto_sequence(simt)
end

-- Handle button presses
function consumebutton(bt, event)
  if bt == 0 and event%PANEL_MOUSE.LBPRESSED == PANEL_MOUSE.LBDOWN then
    auto_retrograde=not auto_retrograde
    vi:set_thrustergrouplevel(THGROUP.ATT_PITCHUP,0)
    vi:set_thrustergrouplevel(THGROUP.ATT_PITCHDOWN,0)
    vi:set_thrustergrouplevel(THGROUP.ATT_YAWRIGHT,0)
    vi:set_thrustergrouplevel(THGROUP.ATT_YAWLEFT,0)

    return true
  elseif bt == 1 and event%PANEL_MOUSE.LBPRESSED == PANEL_MOUSE.LBDOWN then
    auto_throttle=not auto_throttle
    vi:set_thrustergrouplevel(THGROUP.MAIN,0)

    return true
  elseif bt == 11 and event%PANEL_MOUSE.LBPRESSED == PANEL_MOUSE.LBDOWN then
    -- CLR button: just refresh
    mfd:invalidate_display()
    return true
  end
  return false
end
