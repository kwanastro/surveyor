  anim_scoop=vi:create_animation(0.0)
  vi:add_animationcomponent(anim_scoop, 0.0, 1.0, oapi.create_animationcomponent({
    type = 'rotation',
    mesh = 0,
    grp = {14},
    ref = {x=-0.115,y=-0.756,z=0.00},
    axis = {x=0,y=0,z=1},
    angle = 105/(180/PI)
