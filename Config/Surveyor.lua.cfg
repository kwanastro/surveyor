    mesh = 0,
    grp = {19},
    ref = {x=TRI32*LEG_PIVOT_RAD,y=-0.5*LEG_PIVOT_RAD,z=LEG_PIVOT_STA},
    axis = {x=-0.5,y=-TRI32,z=0},
