end

function create_propellant()
  ph_vernier = vi:create_propellantresource(VERNIER_PROP_MASS);
  ph_rcs     = vi:create_propellantresource(RCS_PROP_MASS);
  ph_retro   = vi:create_propellantresource(RETRO_PROP_MASS);
  vi:set_default_propellantresource(ph_vernier);

end

function create_thrusters()
    th_retro = vi:create_thruster({pos=_V(0.0,0.0,RETRO_STA),dir=_V(0,0,1),maxth0=RETRO_THRUST, hprop=ph_retro, isp0=RETRO_ISP});
  vi:add_exhaust(th_retro, 2, 0.3);

  th_vernier={vi:create_thruster({pos=_V(   0.0*VERNIER_RAD, 1.0*VERNIER_RAD,VERNIER_STA), dir=_V(0,0,1), maxth0=VERNIER_THRUST, hprop=ph_vernier, isp0=VERNIER_ISP}),
              vi:create_thruster({pos=_V( TRI32*VERNIER_RAD,-0.5*VERNIER_RAD,VERNIER_STA), dir=_V(0,0,1), maxth0=VERNIER_THRUST, hprop=ph_vernier, isp0=VERNIER_ISP}),
              vi:create_thruster({pos=_V(-TRI32*VERNIER_RAD,-0.5*VERNIER_RAD,VERNIER_STA), dir=_V(0,0,1), maxth0=VERNIER_THRUST, hprop=ph_vernier, isp0=VERNIER_ISP})
              }
  
  vi:create_thrustergroup(th_vernier, THGROUP.MAIN);
  for i,thr in ipairs(th_vernier) do
      vi:add_exhaust(thr, 1, 0.1)
  end
end

function clbk_setclasscaps(cfg)

  -- physical vessel parameters
  vi:set_size(1.0)
  vi:set_emptymass(LANDER_EMPTY_MASS)
  
  vi:set_pmi(_V(0.5,0.6,0.5));
  vi:set_cameraoffset (_V(0,1,1));
  vi:set_touchdownpoints( _V( 0,LEG_RAD,LEG_STA), _V( TRI32*LEG_RAD,-0.5*LEG_RAD,LEG_STA), _V(-TRI32*LEG_RAD,-0.5*LEG_RAD,LEG_STA));
  
  create_animations()
  create_propellant()
  create_thrusters()
  
  -- associate a mesh for the visual
  vi:add_mesh('Surveyor-Lander')
end

function clbk_savestate(scn)
  anim_status_savestate(scn,gear_status)
  anim_status_savestate(scn,ant_status)
  anim_status_savestate(scn,scoop_status)
end

local function toggle_status(status)
    if status.state == DEPLOYED or status.state == DEPLOYING then
        status.state=STOWING
    else
        status.state=DEPLOYING
    end
end

function clbk_consumebufferedkey(key, down, kstate)
    if not down then -- only process keydown events
        return false
    end

    if key == OAPI_KEY.G then     -- deploy/retract gear
        toggle_status(gear_status)
        return true
    end
    if key == OAPI_KEY.A then     -- deploy/retract gear
        toggle_status(ant_status)
        return true
    end
    if key == OAPI_KEY.S then     -- deploy/retract gear
        toggle_status(scoop_status)
        return true
    end
    return false
end

function Sproing(progress)
    return 1-(math.cos(PI*progress)/2.0+0.5)
end

--------------------------------------------------------------
-- Frame update
--------------------------------------------------------------
function clbk_poststep(simt, simdt, mjd)
    -- Animations
    anim_status_propagate(gear_status,simdt)
    anim_status_propagate(ant_status,simdt)
    anim_status_propagate(scoop_status,simdt)
end


