--[[
ClassName = Surveyor.lua
Module = ScriptVessel
Script = Surveyor.lua.cfg

; === Attachment specs ===
BEGIN_ATTACHMENT
P 0 0 -0.33  0 0 -1  0 1 0  XS
END_ATTACHMENT
END_PARSE
]]--


-- Vessel parameters
LANDER_EMPTY_MASS=289.10
GEAR_TIME = 0.5

TRI32=math.sqrt(3.0)/2.0

LEG_RAD       =  2.052
LEG_STA       = -0.792
LEG_PIVOT_RAD =  1.119
LEG_PIVOT_STA = -0.33

--For deploy/stow animations:
-- * Model shows deployed configuration
-- * deployed is animation progress 0.0
-- * stowed is animation progress 1.0
-- * deploying decreases animation progress
-- * stwoing increases animation progress
DEPLOYED=0
STOWED=1
DEPLOYING=2
STOWING=3

gear_status={progress=0.0, state=DEPLOYED, tag="GEAR",time=0.5,anim=nil}
ant_status={progress=0.0, state=DEPLOYED, tag="ANT",time=0.5,anim=nil}

function anim_status_savestate(scn,status)
  oapi.writescenario_string(scn, status.tag,   status.state   .. " " .. status.progress)
end

function anim_status_propagate(status,simdt)
    local da = simdt / status.time
    if status.state == STOWING then
        if status.progress < 1.0 then
            status.progress=math.min(1.0, status.progress + da)
            if status.tag=="ANT" then oapi.dbg_out("STOWING "..status.state.." "..Sproing(status.progress).." "..da) end
            vi:set_animation(status.anim,Sproing(status.progress))
       else
            status.state = STOWED
       end
    elseif status.state == DEPLOYING then
        if status.progress > 0.0 then
            status.progress = math.max(0.0, status.progress - da)
            if status.tag=="ANT" then oapi.dbg_out("DEPLOYING "..status.state.." "..Sproing(status.progress).." "..da) end
            vi:set_animation(status.anim, Sproing(status.progress))
        else
            status.state = DEPLOYED
        end
    elseif status.state==STOWED then
        if status.tag=="ANT" then oapi.dbg_out("STOWED "..status.state.." "..Sproing(status.progress).." "..da) end
    elseif status.state==DEPLOYED then
        if status.tag=="ANT" then oapi.dbg_out("DEPLOYED "..status.state.." "..Sproing(status.progress).." "..da) end
    else
        if status.tag=="ANT" then oapi.dbg_out("UNKNOWN "..status.state.." "..Sproing(status.progress).." "..da) end
    end
end

-- helper function to create an iterator usable in a for loop
local function iterate_lines(scn)
    return function()
              return oapi.readscenario_nextline(scn)
           end
end

function clbk_loadstateex(scn, vs)
  for line in iterate_lines(scn) do
       local kw, state, progress = line:match("(%S+) (%d) (%S+)")
       if     kw == "GEAR"   then 
          gear_status.state=tonumber(state)
          gear_status.progress   = tonumber(progress)
          vi:set_animation(gear_status.anim,   Sproing(gear_status.progress))
       else
           vi:parse_scenario_line_ex(line, vs)
       end
  end
  
end

-- SetClassCaps implementation

