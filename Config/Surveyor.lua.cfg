  vi:add_animationcomponent(anim_ant, 0.0, 1.0, oapi.create_animationcomponent({
    type = 'rotation',
    mesh = 0,
    grp = {16},
    ref = {x=0,y=LEG_PIVOT_RAD,z=LEG_PIVOT_STA},
    axis = {x=1,y=0,z=0},
    angle = 45/(180/PI)
  }))
  -- High Gain 
  vi:add_animationcomponent(anim_ant, 0.0, 1.0, oapi.create_animationcomponent({
    type = 'rotation',
    mesh = 0,
    grp = {12},
    ref = {x=0,y=-0.236,z=2.105},
    axis = {x=1,y=0,z=0},
    angle = 45/(180/PI)
  }))
  -- Solar Panel
  vi:add_animationcomponent(anim_ant, 0.0, 1.0, oapi.create_animationcomponent({
    type = 'rotation',
    mesh = 0,
    grp = {13},
