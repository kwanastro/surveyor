  vi:add_animationcomponent(anim_gear, 0.0, 1.0, oapi.create_animationcomponent({
    type = 'rotation',
    mesh = 0,
    grp = {18},
    ref = {x=-TRI32*LEG_PIVOT_RAD,y=-0.5*LEG_PIVOT_RAD,z=LEG_PIVOT_STA},
    axis = {x=-0.5,y=TRI32,z=0},
    angle = 130/(180/PI)
  }))
  --leg3
  vi:add_animationcomponent(anim_gear, 0.0, 1.0, oapi.create_animationcomponent({
    type = 'rotation',
    mesh = 0,
    grp = {19},
    ref = {x=TRI32*LEG_PIVOT_RAD,y=-0.5*LEG_PIVOT_RAD,z=LEG_PIVOT_STA},
    axis = {x=-0.5,y=-TRI32,z=0},
    angle = 130/(180/PI)
  }))
  gear_status.anim=anim_gear
  
  anim_ant=vi:create_animation(0.0)
